<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3ba6"/>
      <stop offset="55%" stop-color="#2456e6"/>
      <stop offset="120%" stop-color="#0ea5a0"/>
    </linearGradient>
    <linearGradient id="b1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="b2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <rect width="800" height="1000" fill="url(#sky)"/>

  <!-- soft sun glow -->
  <circle cx="620" cy="300" r="220" fill="#ffffff" opacity="0.10"/>
  <circle cx="620" cy="300" r="130" fill="#ffffff" opacity="0.10"/>

  <!-- back skyline -->
  <g fill="url(#b2)">
    <rect x="40"  y="520" width="90"  height="480"/>
    <rect x="150" y="440" width="70"  height="560"/>
    <rect x="560" y="470" width="80"  height="530"/>
    <rect x="660" y="400" width="100" height="600"/>
  </g>

  <!-- front buildings -->
  <g fill="url(#b1)">
    <rect x="240" y="360" width="150" height="640" rx="4"/>
    <rect x="410" y="300" width="140" height="700" rx="4"/>
  </g>

  <!-- window grid -->
  <g fill="#ffffff" opacity="0.14">
    <!-- building A -->
    <g>
      <rect x="262" y="392" width="18" height="26"/><rect x="292" y="392" width="18" height="26"/><rect x="322" y="392" width="18" height="26"/><rect x="352" y="392" width="18" height="26"/>
      <rect x="262" y="440" width="18" height="26"/><rect x="292" y="440" width="18" height="26"/><rect x="322" y="440" width="18" height="26"/><rect x="352" y="440" width="18" height="26"/>
      <rect x="262" y="488" width="18" height="26"/><rect x="292" y="488" width="18" height="26"/><rect x="322" y="488" width="18" height="26"/><rect x="352" y="488" width="18" height="26"/>
      <rect x="262" y="536" width="18" height="26"/><rect x="292" y="536" width="18" height="26"/><rect x="322" y="536" width="18" height="26"/><rect x="352" y="536" width="18" height="26"/>
      <rect x="262" y="584" width="18" height="26"/><rect x="292" y="584" width="18" height="26"/><rect x="322" y="584" width="18" height="26"/><rect x="352" y="584" width="18" height="26"/>
    </g>
    <!-- building B -->
    <g>
      <rect x="432" y="332" width="18" height="26"/><rect x="462" y="332" width="18" height="26"/><rect x="492" y="332" width="18" height="26"/><rect x="522" y="332" width="18" height="26"/>
      <rect x="432" y="380" width="18" height="26"/><rect x="462" y="380" width="18" height="26"/><rect x="492" y="380" width="18" height="26"/><rect x="522" y="380" width="18" height="26"/>
      <rect x="432" y="428" width="18" height="26"/><rect x="462" y="428" width="18" height="26"/><rect x="492" y="428" width="18" height="26"/><rect x="522" y="428" width="18" height="26"/>
      <rect x="432" y="476" width="18" height="26"/><rect x="462" y="476" width="18" height="26"/><rect x="492" y="476" width="18" height="26"/><rect x="522" y="476" width="18" height="26"/>
      <rect x="432" y="524" width="18" height="26"/><rect x="462" y="524" width="18" height="26"/><rect x="492" y="524" width="18" height="26"/><rect x="522" y="524" width="18" height="26"/>
    </g>
  </g>
</svg>
