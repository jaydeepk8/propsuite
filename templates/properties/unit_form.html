{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}{{ form_title }} · PropSuite{% endblock %}

{% block content %}
<div class="rw-breadcrumb mb-2">
  <a href="{% url 'properties:list' %}" class="text-decoration-none text-muted">Properties</a>
  <span class="sep">›</span>
  <a href="{% url 'properties:detail' property.pk %}" class="text-decoration-none text-muted">{{ property.title }}</a>
  <span class="sep">›</span><span class="current">{{ form_title }}</span>
</div>
<h1 class="rw-page-title mb-1">{{ form_title }}</h1>
<p class="rw-page-sub mb-4">{{ property.title }}</p>

<div class="row">
  <div class="col-lg-8 col-xl-6">
    <div class="card p-4">
      <form method="post" novalidate>
        {% csrf_token %}
        {% crispy form %}
        <div class="mt-4 d-flex gap-2">
          <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Save Unit</button>
          <a href="{% url 'properties:detail' property.pk %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
