{% extends "base_auth.html" %}
{% block title %}Password reset · PropSuite{% endblock %}

{% block auth_body %}
<div class="text-center">
  <div class="rw-avatar mx-auto mb-3 rw-badge-green" style="width:56px;height:56px;font-size:1.4rem;">
    <i class="bi bi-check-lg"></i>
  </div>
  <h2 class="mb-1">Password reset complete</h2>
  <p class="text-muted mb-4">Your password has been updated. You can now sign in with it.</p>
  <a href="{% url 'accounts:login' %}" class="btn btn-primary w-100 py-2">Sign in</a>
</div>
{% endblock %}
