{% extends "base_auth.html" %}
{% block title %}Check your email · PropSuite{% endblock %}

{% block auth_body %}
<div class="text-center">
  <div class="rw-avatar mx-auto mb-3" style="width:56px;height:56px;font-size:1.4rem;">
    <i class="bi bi-envelope-check"></i>
  </div>
  <h2 class="mb-1">Check your email</h2>
  <p class="text-muted mb-4">
    If an account exists for that address, we've sent password-reset
    instructions. They should arrive shortly.
  </p>
  <a href="{% url 'accounts:login' %}" class="btn btn-primary w-100 py-2">Back to sign in</a>
</div>
{% endblock %}
