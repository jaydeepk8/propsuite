{% extends "base_auth.html" %}
{% block title %}Reset password · PropSuite{% endblock %}

{% block auth_body %}
<h2 class="mb-1">Forgot password?</h2>
<p class="text-muted mb-4">Enter your email and we'll send you a reset link.</p>

<form method="post" novalidate>
  {% csrf_token %}
  <div class="mb-4">
    <label class="form-label fw-semibold" for="{{ form.email.id_for_label }}">Email Address</label>
    <div class="rw-input-icon">
      <i class="bi bi-envelope"></i>
      <input type="email" name="email" class="form-control" placeholder="name@company.com" required
             id="{{ form.email.id_for_label }}" value="{{ form.email.value|default:'' }}">
    </div>
    {% for e in form.email.errors %}<div class="text-danger small mt-1">{{ e }}</div>{% endfor %}
  </div>
  <button type="submit" class="btn btn-primary w-100 py-2">Send reset link</button>
</form>

<p class="text-center text-muted mt-4 mb-0">
  <a href="{% url 'accounts:login' %}" class="text-brand fw-semibold text-decoration-none">
    <i class="bi bi-arrow-left me-1"></i>Back to sign in
  </a>
</p>
{% endblock %}
